<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Compliments</title>
<style>
body{
background:#fff0f5;
text-align:center;
padding-top:100px;
font-family:Arial;
}

button{
padding:15px 25px;
border:none;
border-radius:20px;
background:#ff80bf;
color:white;
font-size:18px;
}
</style>
</head>

<body>

<h1>💖 Random Compliment</h1>

<h2 id="text">กดปุ่มสิ 🤍</h2>

<button onclick="randomText()">สุ่มคำชม</button>

<br><br>

<a href="index.html">กลับหน้าหลัก</a>

<script>
const compliments=[
"เธอเก่งมาก 🌟",
"เราภูมิใจในตัวเธอเสมอ 🤍",
"เธอทำได้แน่นอน ✨",
"เธอน่ารักเกินไปแล้ว 🥹",
"โลกใจดีกับเราที่ส่งเธอมา 🌷",
"เธอเป็นคนที่เราชอบคุยด้วยที่สุด 💖",
"อย่าลืมว่ามีคนเชียร์เธออยู่เสมอ 🫶"
];

function randomText(){
document.getElementById("text").innerHTML=
compliments[Math.floor(Math.random()*compliments.length)];
}
</script>

</body>
</html>
