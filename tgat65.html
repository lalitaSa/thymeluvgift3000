},

{
id:60,
question:"Which sentence DOES NOT belong in this paragraph?",
choices:[
"D",
"E",
"F",
"G",
"H"
],
answer:"C"
},
];


function loadQuiz(){
let start=1;
let end=60;

let html="";

for(let i=start;i<=end;i++){

let q = questions.find(x => x.id === i);

if(!q) continue;

html += `
<div style="padding:10px;border-bottom:1px solid #eee">

<b>Question ${q.id}</b><br><br>

<pre style="
white-space:pre-wrap;
font-family:inherit;
background:#f8f8f8;
padding:10px;
border-radius:10px;
">
${q.passage || q.question}
</pre><br>

<label>
<input type="radio" name="q${q.id}" value="A">
${q.choices[0]}
</label>
<br>

<label>
<input type="radio" name="q${q.id}" value="B">
${q.choices[1]}
</label><br>

<label>
<input type="radio" name="q${q.id}" value="C">
${q.choices[2]}
</label><br>

<label>
<input type="radio" name="q${q.id}" value="D">
${q.choices[3]}
</label>

</label>

<div id="review${q.id}" style="
margin-top:10px;
padding:8px;
background:#fff5f9;
border-radius:8px;
display:none;
"></div>

</div>
`;
}

html+=`<button onclick="grade()">Submit</button>`;

document.getElementById("quiz").innerHTML=html;
}

function grade(){

let score=0;


for(let i=start;i<=end;i++){

let selected=document.querySelector(`input[name=q${i}]:checked`);
let user=selected ? selected.value : "-";

let q = questions.find(x => x.id === i);

if(user===q.answer) score++;

document.getElementById(`review${i}`).style.display = "block";

document.getElementById(`review${i}`).innerHTML = `
${user===q.answer ? "✅ ถูกต้อง" : "❌ ไม่ถูกต้อง"}
<br>
Your Answer: ${user}
<br>
Correct Answer: ${q.answer}
`;
}

let total = end - start + 1;

document.getElementById("result").innerHTML =
`<h2>🎉 คะแนน ${score}/${total}</h2>`;

// บันทึกคะแนน
saveHistory(score,total);

// โหลดประวัติใหม่
showHistory();
}

function saveHistory(score,total){

let history =
JSON.parse(localStorage.getItem("tgatHistory")) || [];

history.unshift({
date:new Date().toLocaleString("th-TH"),
score:score,
total:total
});

localStorage.setItem(
"tgatHistory",
JSON.stringify(history)
);

}

function showHistory(){

let history =
JSON.parse(localStorage.getItem("tgatHistory")) || [];

let html = "";

history.forEach((item,index)=>{

html += `
<div style="
padding:10px;
margin:8px 0;
background:#fff5f9;
border-radius:10px;
">

<b>ครั้งที่ ${history.length-index}</b>

<br>

📅 ${item.date}

<br>

🎯 ${item.score}/${item.total}

</div>
`;

});

document.getElementById("history").innerHTML = html;

}

function clearHistory(){

if(confirm("ลบประวัติทั้งหมด?")){

localStorage.removeItem("tgatHistory");

showHistory();

}
showHistory();
}

loadQuiz();
showHistory();
</script>

</body>
</html>
