<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Thyme 🤍</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(180deg,#ffd6e7,#fff4f8);
    text-align:center;
    min-height:100vh;
}

.container{
    padding-top:80px;
}

h1{
    color:#ff4d94;
    font-size:48px;
}

.subtitle{
    color:#666;
    font-size:20px;
    margin-bottom:30px;
}

.start-btn{
    background:#ff80bf;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
}

.menu{
    margin-top:40px;
}

.menu a{
    text-decoration:none;
}

.menu button{
    display:block;
    margin:15px auto;
    width:280px;
    padding:15px;
    border:none;
    border-radius:20px;
    background:white;
    color:#ff4d94;
    font-size:18px;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

#main{
    display:none;
}
</style>

</head>

<body>

<div class="container">

<div id="welcome">

<h1>🌷 Welcome Thyme 🌷</h1>

<p class="subtitle">
มีเว็บเล็ก ๆ ที่อยากให้เธอดู 🤍
</p>

<button class="start-btn" onclick="startWebsite()">
🎵 เปิดเพลงและเข้าเว็บ
</button>

</div>

<div id="main">

<h1>🩷 Thyme's Special Website 🩷</h1>

<div class="menu">

<a href="compliments.html">
<button>💖 สุ่มคำชม</button>
</a>

<a href="secret.html">
<button>🔐 ห้องลับ</button>
</a>

<a href="surgery.html">
<button>🩺 เตรียมตัวก่อนผ่าตัด</button>
</a>

<a href="tcas.html">
<button>📚 Plan TCAS</button>
</a>

</div>

</div>

<audio id="bgm" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>
function startWebsite(){
    document.getElementById("bgm").play();
    document.getElementById("welcome").style.display="none";
    document.getElementById("main").style.display="block";
}
</script>

</div>

</body>
</html>
