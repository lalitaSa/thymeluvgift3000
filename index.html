<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Thyme 🤍</title>

<style>
body{
background:linear-gradient(#ffd6e7,#fff0f5);
font-family:Arial,sans-serif;
text-align:center;
padding-top:80px;
min-height:100vh;
overflow:hidden;
}

h1{
color:#ff4d94;
}

button{
width:250px;
padding:15px;
margin:10px;
border:none;
border-radius:20px;
background:#ff80bf;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

.heart{
position:fixed;
font-size:20px;
animation:float 8s linear infinite;
opacity:.7;
}

@keyframes float{
from{
transform:translateY(100vh);
}
to{
transform:translateY(-100px);
}
}
</style>
</head>

<body>

<h1>🌷 Thyme's Special Website 🌷</h1>

<p>เว็บนี้สร้างมาเพื่อคนเก่งคนหนึ่ง 🤍</p>

<p id="musicStatus">🎵 กดที่ไหนก็ได้เพื่อเปิดเพลง</p>

<a href="compliments.html"><button>💖 สุ่มคำชม</button></a><br>
<a href="secret.html"><button>🔐 ห้องลับ</button></a><br>
<a href="surgery.html"><button>🩺 เตรียมตัวก่อนผ่าตัด</button></a><br>
<a href="tcas.html"><button>📚 Plan TCAS</button></a>

<audio id="bgm" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>
document.addEventListener("click",function(){
document.getElementById("bgm").play();
document.getElementById("musicStatus").innerHTML="🎵 เพลงกำลังเล่น";
},{once:true});

for(let i=0;i<20;i++){
let heart=document.createElement("div");
heart.innerHTML="🤍";
heart.className="heart";
heart.style.left=Math.random()*100+"%";
heart.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(heart);
}
</script>

</body>
</html>
