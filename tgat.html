<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mock TGAT</title>
<style>
body{font-family:Arial,sans-serif;background:#ffd6e7;padding:20px;text-align:center}
.card{background:white;max-width:900px;margin:auto;padding:20px;border-radius:20px}
button{padding:12px 20px;border:none;border-radius:12px;background:#ff66b3;color:white;cursor:pointer;margin:5px}
</style>
</head>
<body>
<div class="card">
<h1>📝 Mock Test TGAT English</h1>
<p>เลือกชุดข้อสอบ</p>
<button onclick="loadSet(1)">Set 1 (1-20)</button>
<button onclick="loadSet(2)">Set 2 (21-40)</button>
<button onclick="loadSet(3)">Set 3 (41-60)</button>

<div id="quiz"></div>
<div id="result"></div>

<br><br>
<button onclick="window.location.href='index_with_tgat_link.html'">🏠 กลับหน้าหลัก</button>
</div>
<script>
const answers={
1:'C',2:'C',3:'D',4:'A',5:'D',
6:'B',7:'A',8:'C',9:'B',10:'D',
11:'C',12:'C',13:'D',14:'A',15:'B',
16:'A',17:'D',18:'A',19:'B',20:'A',
21:'B',22:'B',23:'C',24:'B',25:'C',
26:'D',27:'D',28:'B',29:'C',30:'C',
31:'A',32:'A',33:'A',34:'D',35:'C',
36:'D',37:'D',38:'A',39:'C',40:'D',
41:'D',42:'B',43:'A',44:'A',45:'D',
46:'B',47:'A',48:'C',49:'A',50:'C',
51:'C',52:'B',53:'B',54:'D',55:'B',
56:'B',57:'B',58:'C',59:'C',60:'D'
};

function loadSet(set){
let start=(set-1)*20+1;
let end=start+19;

let html="";

for(let i=start;i<=end;i++){

html+=`
<div style="padding:10px;border-bottom:1px solid #eee">
<b>Question ${i}</b><br>
<label><input type="radio" name="q${i}" value="A"> A</label>
<label><input type="radio" name="q${i}" value="B"> B</label>
<label><input type="radio" name="q${i}" value="C"> C</label>
<label><input type="radio" name="q${i}" value="D"> D</label>
</div>
`;
}

html+=`<button onclick="grade(${start},${end})">Submit</button>`;

document.getElementById("quiz").innerHTML=html;
}

function grade(start,end){

let score=0;
let review="";

for(let i=start;i<=end;i++){

let selected=document.querySelector(`input[name=q${i}]:checked`);
let user=selected ? selected.value : "-";

if(user===answers[i]) score++;

review+=`
<div>
ข้อ ${i}
${user===answers[i]?"✅":"❌"}
ตอบ ${user}
| เฉลย ${answers[i]}
</div>
`;
}

document.getElementById("result").innerHTML=
`<h2>คะแนน ${score}/20</h2>`+review;
}
</script>

</body>
</html>
