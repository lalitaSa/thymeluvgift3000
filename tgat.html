function loadSet(set){
let start=(set-1)*20+1;
let end=start+19;

let html="";

for(let i=start;i<=end;i++){

let q = questions.find(x => x.id === i);

if(!q) continue;

html += `
<div style="padding:10px;border-bottom:1px solid #eee">

<b>Question ${q.id}</b><br><br>

<pre style="
white-space:pre-wrap;
font-family:inherit;
background:#f8f8f8;
padding:10px;
border-radius:10px;
">
${q.passage || q.question}
</pre><br>

<label>
<input type="radio" name="q${q.id}" value="A">
${q.choices[0]}
</label><br>

<label>
<input type="radio" name="q${q.id}" value="B">
${q.choices[1]}
</label><br>

<label>
<input type="radio" name="q${q.id}" value="C">
${q.choices[2]}
</label><br>

<label>
<input type="radio" name="q${q.id}" value="D">
${q.choices[3]}
</label>

</div>
`;
}

html+=`<button onclick="grade(${start},${end})">Submit</button>`;

document.getElementById("quiz").innerHTML=html;
}

function grade(start,end){

let score=0;
let review="";

for(let i=start;i<=end;i++){

let selected=document.querySelector(`input[name=q${i}]:checked`);
let user=selected ? selected.value : "-";

let q = questions.find(x => x.id === i);

if(user===q.answer) score++;

review+=`
<div>
ข้อ ${i}
${user===q.answer ? "✅" : "❌"}
ตอบ ${user}
| เฉลย ${q.answer}
</div>
`;
}

document.getElementById("result").innerHTML=
`<h2>คะแนน ${score}/20</h2>`+review;
}
